name: Deploy HTML to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Construire un dossier de publication en excluant README.md (et d'autres trucs inutiles)
      - name: Prepare publish directory
        run: |
          mkdir -p dist
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='*.md' \
            ./ dist/

      # Sécurité: vérifier qu'un index.html existe bien
      - name: Check index.html
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html not found. Put index.html at repo root or adjust path." && exit 1)

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
